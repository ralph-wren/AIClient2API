services:
  aiclient-api:
    # 方式一：使用 Docker Hub 预构建镜像（默认，推荐）
    # 使用方法: docker compose up -d
    image: justlikemaki/aiclient-2-api:latest
    container_name: aiclient2api
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "8085-8087:8085-8087"
      - "1455:1455"
      - "56121:56121"
      - "19876-19880:19876-19880"
    volumes:
      - ./configs:/app/configs
      - ../src/providers/provider-models.js:/app/src/providers/provider-models.js:ro
      - ../src/providers/claude/claude-kiro.js:/app/src/providers/claude/claude-kiro.js:ro
    environment:
      - ARGS=--port 3001
      - SERVER_PORT=3001
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
